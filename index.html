      'frames/img_6_0044.jpg',
    ];

    // Group frames by video (img_1, img_2, ...)
    const groups = {};
    for (const f of frames) {
      const key = f.match(/img_\d+/)[0];
      if (!groups[key]) groups[key] = [];
      groups[key].push(f);
    }
    const groupKeys = Object.keys(groups).filter(k => groups[k].length >= 6);

    let deck = [];

    function pickGroup() {
      if (deck.length === 0) {
        deck = [...groupKeys];
        for (let i = deck.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [deck[i], deck[j]] = [deck[j], deck[i]];
        }
      }
      return deck.pop();
    }

    function randomBatch() {
      const key = pickGroup();
      const group = groups[key];
      const start = Math.floor(Math.random() * (group.length - 6 + 1));
      return group.slice(start, start + 6);
    }

    function* makeFrameGen() {
      let curr = randomBatch();
      yield curr[0]; yield curr[1]; yield curr[2]; yield curr[3];
      while (true) {
        const nxt = randomBatch();
        yield nxt[0]; yield curr[4]; yield nxt[1]; yield curr[5];
        yield nxt[2]; yield nxt[3];
        curr = nxt;
      }
    }

    const gen = makeFrameGen();
    const nextSrc = () => gen.next().value;

    const imgA = document.getElementById('a');
    const imgB = document.getElementById('b');
    let front = imgA;
    let back = imgB;

    front.src = nextSrc();
    back.src = nextSrc();
    front.style.zIndex = 1;
    back.style.zIndex = 0;

    const FADE = 150;

    setInterval(() => {
      // front fades out while staying on top, revealing back underneath
      front.style.transition = `opacity ${FADE}ms linear`;
      front.style.opacity = 0;

      setTimeout(() => {
        // After fade: promote back to front, reset old front as new back
        back.style.zIndex = 1;
        front.style.zIndex = 0;
        [front, back] = [back, front];
        back.style.transition = 'none';
        back.style.opacity = 1;
        back.src = nextSrc();
      }, FADE);
    }, Math.round(1000 / 6));
  </script>
